# Detect agents.md / AGENTS.md AI agent instruction files.
#
# AGENTS.md (and agents.md) define AI agent behaviour and
# tool permissions for agentic coding environments.

[detector]
name = "agents_md"
description = "Detect agents.md / AGENTS.md AI agent instruction files"
artifact_type = "agents_md"

[match]
filenames = ["agents.md", "AGENTS.md"]
confidence = 0.7

[keywords]
keywords = ["tools", "permissions", "system", "instructions", "shell", "browser", "api"]
signals_prefix = "keyword"
boost_confidence = 0.9
boost_threshold = 1

[deep_keywords]
keywords = ["dependencies", "execute", "network", "filesystem", "docker", "secrets"]
signals_prefix = "deep_keyword"
boost_confidence = 0.9
boost_threshold = 1
