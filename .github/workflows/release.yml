# ──────────────────────────────────────────────────────────────────────
# Release workflow — build cross-platform binaries, publish GitHub
# Release, and upload artifacts + manifest to S3.
#
# SUPPLY CHAIN SECURITY:
#   • All third-party Actions are pinned to full commit SHAs to prevent
#     tag-repointing attacks (see: tj-actions/changed-files incident).
#     The "# vN" comment after each SHA records the human-readable tag
#     at the time of pinning — Dependabot uses it to propose updates.
#   • Job-level `permissions` follow least-privilege: each job declares
#     only the scopes it actually needs.
#   • OIDC (`id-token: write`) is used for AWS instead of long-lived keys.
#
# RUNNERS:
#   • Linux/Windows builds use Blacksmith runners for 2× speed + colocated
#     cache (https://docs.blacksmith.sh). macOS uses GitHub-hosted runners
#     because Blacksmith doesn't offer macOS.
#   • Swatinem/rust-cache works on all runners — Blacksmith transparently
#     intercepts cache calls on its runners for 4× faster downloads.
#     (useblacksmith/rust-cache is archived and no longer maintained.)
# ──────────────────────────────────────────────────────────────────────

name: Release

on:
    push:
        tags:
            - "v*"
    # Allow manual re-runs in case a release needs to be re-published
    workflow_dispatch:

# Top-level permissions — jobs override with least-privilege below
permissions:
    id-token: write
    contents: write

env:
    CARGO_TERM_COLOR: always
    BINARY_NAME: proov

jobs:
    # ── Build ────────────────────────────────────────────────────────
    # Cross-compile for 5 OS/arch targets. Each matrix leg uploads its
    # artifact so downstream jobs can download without rebuilding.
    build:
        strategy:
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      os: macos-latest # no Blacksmith macOS runners
                      artifact: proov-darwin-arm64.tar.gz
                    - target: x86_64-apple-darwin
                      os: macos-latest
                      artifact: proov-darwin-amd64.tar.gz
                    - target: aarch64-unknown-linux-gnu
                      os: blacksmith-4vcpu-ubuntu-2204
                      artifact: proov-linux-arm64.tar.gz
                      cross: true # needs cross-linker
                    - target: x86_64-unknown-linux-gnu
                      os: blacksmith-4vcpu-ubuntu-2204
                      artifact: proov-linux-amd64.tar.gz
                    - target: x86_64-pc-windows-msvc
                      os: blacksmith-4vcpu-windows-2025
                      artifact: proov-windows-amd64.exe
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
              with:
                  targets: ${{ matrix.target }}

            # rust-toolchain.toml overrides the action's `targets` input,
            # so we explicitly add the target to ensure cross-compilation
            # works (e.g. x86_64-apple-darwin on ARM64 macOS runners).
            - name: Add build target
              run: rustup target add ${{ matrix.target }}

            # Swatinem/rust-cache works on all runners. Blacksmith
            # transparently redirects cache I/O to its colocated store
            # on Blacksmith runners — no code changes needed.
            - name: Cache Cargo
              uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
              with:
                  key: ${{ matrix.target }}

            - name: Install cross-compilation tools (Linux ARM64)
              if: matrix.cross
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu
                  echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

            - name: Build release binary
              run: cargo build --locked --release --target ${{ matrix.target }} -p proov

            - name: Package binary (Unix)
              if: runner.os != 'Windows'
              run: |
                  cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} proov
                  tar -czf ${{ matrix.artifact }} proov

            - name: Package binary (Windows)
              if: runner.os == 'Windows'
              run: cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe ${{ matrix.artifact }}

            - name: Upload build artifact
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: ${{ matrix.artifact }}
                  path: ${{ matrix.artifact }}

    # ── GitHub Release ───────────────────────────────────────────────
    # Collects all build artifacts and creates/updates the GitHub Release.
    release:
        needs: build
        runs-on: blacksmith-2vcpu-ubuntu-2204
        permissions:
            contents: write # create releases + upload assets
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Download all artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: artifacts

            - name: Collect binaries
              run: |
                  mkdir -p release
                  for dir in artifacts/proov-*; do
                    name=$(basename "$dir")
                    cp "$dir/$name" "release/$name"
                  done
                  ls -lh release/

            - name: Create GitHub Release
              uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
              with:
                  generate_release_notes: true
                  files: release/*

    # ── S3 Upload ────────────────────────────────────────────────────
    # Publishes binaries + latest.json to S3 for the self-updater.
    # Uses OIDC federation — no long-lived AWS keys stored in secrets.
    # SHA-256 checksums are embedded in latest.json so the client can
    # verify binary integrity after download.
    upload-s3:
        needs: build
        runs-on: blacksmith-2vcpu-ubuntu-2204
        permissions:
            id-token: write # OIDC token for AWS assume-role
            contents: read
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: artifacts

            - name: Collect binaries
              run: |
                  mkdir -p release
                  for dir in artifacts/proov-*; do
                    name=$(basename "$dir")
                    cp "$dir/$name" "release/$name"
                  done

            # OIDC federation: the runner exchanges a GitHub JWT for
            # short-lived AWS credentials scoped to SCANNER_RELEASE_ROLE_ARN.
            # No long-lived AWS keys are stored in GitHub Secrets.
            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
              with:
                  role-to-assume: ${{ secrets.SCANNER_RELEASE_ROLE_ARN }}
                  aws-region: us-east-1

            - name: Extract tag
              id: tag
              run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

            - name: Upload binaries to S3
              run: |
                  TAG="${{ steps.tag.outputs.TAG }}"
                  for file in release/proov-*; do
                    name=$(basename "$file")
                    echo "Uploading $name → s3://ah-scanner-releases/${TAG}/${name}"
                    aws s3 cp "$file" "s3://ah-scanner-releases/${TAG}/${name}"
                  done

            # Per-artifact SHA-256 checksums are embedded in latest.json
            # so `proov update` can verify binary integrity after download.
            - name: Generate SHA-256 checksums
              id: checksums
              run: |
                  for file in release/proov-*; do
                    name=$(basename "$file")
                    hash=$(sha256sum "$file" | awk '{print $1}')
                    echo "SHA256 $name = $hash"
                    key=$(echo "$name" | sed 's/[^a-zA-Z0-9]/_/g')
                    echo "${key}=${hash}" >> "$GITHUB_OUTPUT"
                  done

            - name: Write latest.json with checksums
              run: |
                  TAG="${{ steps.tag.outputs.TAG }}"
                  S3_BASE="https://ah-scanner-releases.s3.amazonaws.com/${TAG}"
                  DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

                  cat > /tmp/latest.json <<EOF
                  {
                    "version": "${TAG}",
                    "date": "${DATE}",
                    "artifacts": {
                      "darwin-arm64": {
                        "url": "${S3_BASE}/proov-darwin-arm64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_darwin_arm64_tar_gz }}"
                      },
                      "darwin-amd64": {
                        "url": "${S3_BASE}/proov-darwin-amd64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_darwin_amd64_tar_gz }}"
                      },
                      "linux-arm64": {
                        "url": "${S3_BASE}/proov-linux-arm64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_linux_arm64_tar_gz }}"
                      },
                      "linux-amd64": {
                        "url": "${S3_BASE}/proov-linux-amd64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_linux_amd64_tar_gz }}"
                      },
                      "windows-amd64": {
                        "url": "${S3_BASE}/proov-windows-amd64.exe",
                        "sha256": "${{ steps.checksums.outputs.proov_windows_amd64_exe }}"
                      }
                    }
                  }
                  EOF

                  echo "Generated latest.json:"
                  cat /tmp/latest.json

                  aws s3 cp /tmp/latest.json s3://ah-scanner-releases/latest.json \
                    --content-type application/json
