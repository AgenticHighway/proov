name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    id-token: write
    contents: write

env:
    CARGO_TERM_COLOR: always
    BINARY_NAME: proov

jobs:
    build:
        strategy:
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      artifact: proov-darwin-arm64.tar.gz
                    - target: x86_64-apple-darwin
                      os: macos-latest
                      artifact: proov-darwin-amd64.tar.gz
                    - target: aarch64-unknown-linux-gnu
                      os: blacksmith-4vcpu-ubuntu-2204
                      artifact: proov-linux-arm64.tar.gz
                      cross: true
                    - target: x86_64-unknown-linux-gnu
                      os: blacksmith-4vcpu-ubuntu-2204
                      artifact: proov-linux-amd64.tar.gz
                    - target: x86_64-pc-windows-msvc
                      os: blacksmith-4vcpu-windows-2025
                      artifact: proov-windows-amd64.exe
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Cargo (Blacksmith runners)
              if: runner.os == 'Linux' || runner.os == 'Windows'
              uses: useblacksmith/rust-cache@v3
              with:
                  key: ${{ matrix.target }}

            - name: Cache Cargo (macOS)
              if: runner.os == 'macOS'
              uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Install cross-compilation tools (Linux ARM64)
              if: matrix.cross
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu
                  echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }} -p proov

            - name: Package binary (Unix)
              if: runner.os != 'Windows'
              run: |
                  cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} proov
                  tar -czf ${{ matrix.artifact }} proov

            - name: Package binary (Windows)
              if: runner.os == 'Windows'
              run: cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe ${{ matrix.artifact }}

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: ${{ matrix.artifact }}

    release:
        needs: build
        runs-on: blacksmith-2vcpu-ubuntu-2204
        steps:
            - uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Collect binaries
              run: |
                  mkdir -p release
                  for dir in artifacts/proov-*; do
                    name=$(basename "$dir")
                    cp "$dir/$name" "release/$name"
                  done
                  ls -lh release/

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: release/*

    upload-s3:
        needs: build
        runs-on: blacksmith-2vcpu-ubuntu-2204
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Collect binaries
              run: |
                  mkdir -p release
                  for dir in artifacts/proov-*; do
                    name=$(basename "$dir")
                    cp "$dir/$name" "release/$name"
                  done

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.SCANNER_RELEASE_ROLE_ARN }}
                  aws-region: us-east-1

            - name: Extract tag
              id: tag
              run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

            - name: Upload binaries to S3
              run: |
                  TAG="${{ steps.tag.outputs.TAG }}"
                  for file in release/proov-*; do
                    name=$(basename "$file")
                    echo "Uploading $name → s3://ah-scanner-releases/${TAG}/${name}"
                    aws s3 cp "$file" "s3://ah-scanner-releases/${TAG}/${name}" --acl public-read
                  done

            - name: Generate SHA-256 checksums
              id: checksums
              run: |
                  for file in release/proov-*; do
                    name=$(basename "$file")
                    hash=$(sha256sum "$file" | awk '{print $1}')
                    echo "SHA256 $name = $hash"
                    # Export as step outputs (replace dots/dashes with underscores for env var names)
                    key=$(echo "$name" | sed 's/[^a-zA-Z0-9]/_/g')
                    echo "${key}=${hash}" >> "$GITHUB_OUTPUT"
                  done

            - name: Write latest.json with checksums
              run: |
                  TAG="${{ steps.tag.outputs.TAG }}"
                  S3_BASE="https://ah-scanner-releases.s3.amazonaws.com/${TAG}"
                  DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

                  # Build the manifest JSON with per-platform checksums
                  cat > /tmp/latest.json <<EOF
                  {
                    "version": "${TAG}",
                    "date": "${DATE}",
                    "artifacts": {
                      "darwin-arm64": {
                        "url": "${S3_BASE}/proov-darwin-arm64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_darwin_arm64_tar_gz }}"
                      },
                      "darwin-amd64": {
                        "url": "${S3_BASE}/proov-darwin-amd64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_darwin_amd64_tar_gz }}"
                      },
                      "linux-arm64": {
                        "url": "${S3_BASE}/proov-linux-arm64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_linux_arm64_tar_gz }}"
                      },
                      "linux-amd64": {
                        "url": "${S3_BASE}/proov-linux-amd64.tar.gz",
                        "sha256": "${{ steps.checksums.outputs.proov_linux_amd64_tar_gz }}"
                      },
                      "windows-amd64": {
                        "url": "${S3_BASE}/proov-windows-amd64.exe",
                        "sha256": "${{ steps.checksums.outputs.proov_windows_amd64_exe }}"
                      }
                    }
                  }
                  EOF

                  echo "Generated latest.json:"
                  cat /tmp/latest.json

                  aws s3 cp /tmp/latest.json s3://ah-scanner-releases/latest.json \
                    --content-type application/json \
                    --acl public-read
