# ──────────────────────────────────────────────────────────────────────
# CI — runs on every PR and push to main.
#
# PURPOSE:
#   Gate merges behind automated checks: build, lint, test, and
#   dependency audit. This prevents regressions and catches known
#   vulnerabilities before code reaches the release workflow.
#
# SUPPLY CHAIN SECURITY:
#   • All Actions pinned to full commit SHAs (see release.yml header).
#   • `cargo deny` checks licenses and advisories on every PR.
#   • `cargo audit` catches known CVEs in the dependency tree.
#   • Minimal permissions — only `contents: read` for checkout.
#
# RUNNERS:
#   • Blacksmith runners for Linux (2× faster, colocated cache).
#   • Swatinem/rust-cache automatically uses Blacksmith's cache backend
#     when running on Blacksmith runners — no special config needed.
# ──────────────────────────────────────────────────────────────────────

name: CI

on:
    pull_request:
    push:
        branches: [main]

# Least-privilege: CI only needs to read the repo
permissions:
    contents: read

env:
    CARGO_TERM_COLOR: always

jobs:
    check:
        name: Build, lint & test
        runs-on: blacksmith-4vcpu-ubuntu-2204
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
              with:
                  components: clippy

            # Blacksmith intercepts cache calls on its runners — this
            # uses the colocated cache automatically, no extra config.
            - name: Cache Cargo
              uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

            - name: Build
              run: cargo build --all-targets

            # Clippy with deny-warnings ensures zero warnings merge
            - name: Clippy
              run: cargo clippy --all-targets -- -D warnings

            - name: Test
              run: cargo test

    # Separate job so it can run in parallel with build/test
    supply-chain:
        name: Supply chain audit
        runs-on: blacksmith-2vcpu-ubuntu-2204
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Install cargo-deny
              run: |
                  curl -sSL https://github.com/EmbarkStudios/cargo-deny/releases/latest/download/cargo-deny-x86_64-unknown-linux-musl.tar.gz \
                    | tar xzf - --strip-components=1 -C /usr/local/bin

            # cargo-deny checks: advisories, licenses, bans, sources
            - name: cargo deny check
              run: cargo deny check

            - name: Install cargo-audit
              run: cargo install cargo-audit --locked

            # cargo-audit is a second layer — checks the RustSec advisory DB
            - name: cargo audit
              run: cargo audit
